<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Совечик боевика</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>
<body>
   <h1>киновичеринка</h1>
   <p>Севодня мы научимся отправлять даные и получать ответ</p>
 <form  method="post">
     <label for="message">Напиши как ты себя чувствуешь</label>
     <textarea name="message" id="message" cols="50" rows="4" required
               placeholder="Например: Севодня у меня был хороший день">
     {{ user_text }}</textarea>
     <button type="submit">отправить</button>
 </form>
    {% if recommendation %}
        <div class="result">
            <h3>Рекомндация</h3>
            <p>{{ recommendation|safe }}</p>
        </div>
    {% endif %}


   {% if resommendation %}
   <div class="result">
       <h3>Рекомендацыя</h3>
       <p>{ recommendation }</p>
   </div>
 {% endif %}
   </body>
</html>


<p>После отправки формы тебя переноправит на страницу с ответом сервера</p>
</body>
</html>
